# NestJS 反向代理配置模板
# 由 Jenkins Pipeline 自动生成

upstream nestjs_dev {
    server 127.0.0.1:8118;
    keepalive 64;
}

upstream nestjs_staging {
    server 127.0.0.1:8119;
    keepalive 64;
}

upstream nestjs_prod {
    server 127.0.0.1:8120;
    keepalive 64;
}

server {
    listen 80;
    server_name api-dev.localhost;

    access_log /var/log/nginx/nestjs_dev_access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/nestjs_dev_error.log warn;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript text/css;

    location / {
        proxy_pass http://nestjs_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://nestjs_dev/health;
        access_log off;
    }
}