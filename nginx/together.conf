# API 文档（可选，仅开发/测试环境）
server {
    listen 80;
    server_name api-docs.together.local;

    location / {
        proxy_pass http://together_api_backend/api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# 默认服务器（处理未匹配的请求）
server {
    listen 80 default_server;
    server_name _;

    return 444;  # 直接关闭连接
}
